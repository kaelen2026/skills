name: check

on:
  push:
    branches: [main]
  pull_request:

# 同一分支/PR 连续 push 时取消尚在跑的旧 run，省 CI 时间。
# main 上不取消（按 ref 隔离即可），避免漏掉已合入的提交。
concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: 安装依赖
        run: npm ci
      - name: 运行不变量门禁 + markdown 门禁
        run: npm test
      - name: 运行 example app 测试
        working-directory: example/app
        run: npm test
