name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: 安装依赖
        run: npm ci
      - name: 运行不变量门禁 + markdown 门禁
        run: npm test
      - name: 运行 example app 测试
        working-directory: example/app
        run: npm test
